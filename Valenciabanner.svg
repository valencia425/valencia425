<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#0f1b35"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="goldline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0f1e" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F5C842" stop-opacity="1"/>
      <stop offset="80%" stop-color="#F5C842" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0f1e" stop-opacity="0"/>
      <stop offset="15%" stop-color="#F5C842" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#F5C842" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottombg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="leftglow" cx="0%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightglow" cx="100%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Subtle corner glows -->
  <rect width="900" height="220" fill="url(#leftglow)"/>
  <rect width="900" height="220" fill="url(#rightglow)"/>

  <!-- Bottom gradient tint -->
  <rect y="110" width="900" height="110" fill="url(#bottombg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#topbar)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent bar -->
  <rect x="0" y="217" width="900" height="3" fill="url(#topbar)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Left vertical bar -->
  <rect x="0" y="0" width="4" height="220" fill="#F5C842" opacity="0.85"/>
  <!-- Right vertical bar -->
  <rect x="896" y="0" width="4" height="220" fill="#F5C842" opacity="0.85"/>

  <!-- Corner brackets - Top Left -->
  <path d="M10,10 L10,36 M10,10 L36,10" stroke="#F5C842" stroke-width="2.5" fill="none" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Corner brackets - Top Right -->
  <path d="M890,10 L890,36 M890,10 L864,10" stroke="#F5C842" stroke-width="2.5" fill="none" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Corner brackets - Bottom Left -->
  <path d="M10,210 L10,184 M10,210 L36,210" stroke="#F5C842" stroke-width="2.5" fill="none" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </path>
  <!-- Corner brackets - Bottom Right -->
  <path d="M890,210 L890,184 M890,210 L864,210" stroke="#F5C842" stroke-width="2.5" fill="none" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- Subtle dot pattern top-right -->
  <circle cx="780" cy="35" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="800" cy="35" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="820" cy="35" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="840" cy="35" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="780" cy="52" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="800" cy="52" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="820" cy="52" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="840" cy="52" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="780" cy="69" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="800" cy="69" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="820" cy="69" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="840" cy="69" r="1.5" fill="#F5C842" opacity="0.06"/>

  <!-- Subtle dot pattern bottom-left -->
  <circle cx="60" cy="150" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="80" cy="150" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="100" cy="150" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="120" cy="150" r="1.5" fill="#F5C842" opacity="0.15"/>
  <circle cx="60" cy="167" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="80" cy="167" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="100" cy="167" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="120" cy="167" r="1.5" fill="#F5C842" opacity="0.1"/>
  <circle cx="60" cy="184" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="80" cy="184" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="100" cy="184" r="1.5" fill="#F5C842" opacity="0.06"/>
  <circle cx="120" cy="184" r="1.5" fill="#F5C842" opacity="0.06"/>

  <!-- NAME - white, bold, clean -->
  <text x="450" y="100" font-family="Georgia, serif" font-size="56" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="6">
    Valencia S
    <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Gold divider line with pulse -->
  <rect x="180" y="116" width="540" height="1.5" fill="url(#goldline)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Small gold diamond on divider -->
  <polygon points="450,111 455,116 450,121 445,116" fill="#F5C842" opacity="0.9">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Subtitle - gold, professional -->
  <text x="450" y="152" font-family="Arial, sans-serif" font-size="13.5"
        fill="#F5C842" text-anchor="middle" letter-spacing="3" font-weight="normal">
    AI &amp; DS STUDENT  ·  FULLSTACK DEVELOPER  ·  COMPETITIVE PROGRAMMER
    <animate attributeName="opacity" values="0.75;1;0.75" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Tagline - white, smaller -->
  <text x="450" y="182" font-family="Arial, sans-serif" font-size="11"
        fill="#ffffff" text-anchor="middle" letter-spacing="2" opacity="0.4">
    OPEN TO OPPORTUNITIES  ·  FRESHER  ·  INDIA
  </text>

</svg>
