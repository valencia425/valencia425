<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="40%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020818"/>
    </linearGradient>
    <!-- Divider line gradient -->
    <linearGradient id="divline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#020818" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="75%" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020818" stop-opacity="0"/>
    </linearGradient>
    <!-- Scan line gradient -->
    <linearGradient id="scangrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00D9FF" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#00D9FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <!-- Orb gradient -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom wave gradient -->
    <linearGradient id="wavegrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)"/>

  <!-- Animated grid -->
  <g opacity="0.045">
    <!-- Horizontal lines -->
    <line x1="0" y1="27.5" x2="900" y2="27.5" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="55" x2="900" y2="55" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="82.5" x2="900" y2="82.5" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="110" x2="900" y2="110" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="137.5" x2="900" y2="137.5" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="165" x2="900" y2="165" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="0" y1="192.5" x2="900" y2="192.5" stroke="#00D9FF" stroke-width="0.6"/>
    <!-- Vertical lines -->
    <line x1="90" y1="0" x2="90" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="180" y1="0" x2="180" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="270" y1="0" x2="270" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="360" y1="0" x2="360" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="450" y1="0" x2="450" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="540" y1="0" x2="540" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="630" y1="0" x2="630" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="720" y1="0" x2="720" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
    <line x1="810" y1="0" x2="810" y2="220" stroke="#00D9FF" stroke-width="0.6"/>
  </g>

  <!-- Floating orbs with animation -->
  <ellipse cx="100" cy="60" rx="80" ry="70" fill="url(#orb1)">
    <animate attributeName="cy" values="60;45;60" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="800" cy="150" rx="70" ry="60" fill="url(#orb2)">
    <animate attributeName="cy" values="150;135;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="500" cy="185" rx="50" ry="40" fill="url(#orb3)">
    <animate attributeName="cy" values="185;175;185" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="720" cy="30" rx="45" ry="35" fill="url(#orb2)">
    <animate attributeName="cy" values="30;20;30" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Scanning light beam -->
  <rect x="0" y="0" width="900" height="3" fill="url(#scangrad)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,222;0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" keyTimes="0;0.05;0.95;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating particles -->
  <circle cx="120" cy="220" r="2" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="7s" repeatCount="indefinite" begin="0s"/>
    <animate attributeName="opacity" values="0;0.7;0.5;0" keyTimes="0;0.1;0.8;1" dur="7s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="240" cy="220" r="1.5" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="9s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0" keyTimes="0;0.1;0.8;1" dur="9s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="380" cy="220" r="2.5" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="8s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0;0.8;0.5;0" keyTimes="0;0.1;0.8;1" dur="8s" repeatCount="indefinite" begin="3s"/>
  </circle>
  <circle cx="520" cy="220" r="1.5" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="6s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="opacity" values="0;0.5;0.3;0" keyTimes="0;0.1;0.8;1" dur="6s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="660" cy="220" r="2" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="10s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0;0.7;0.4;0" keyTimes="0;0.1;0.8;1" dur="10s" repeatCount="indefinite" begin="4s"/>
  </circle>
  <circle cx="780" cy="220" r="1.5" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="7.5s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0;0.6;0.3;0" keyTimes="0;0.1;0.8;1" dur="7.5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="60" cy="220" r="1" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="11s" repeatCount="indefinite" begin="5s"/>
    <animate attributeName="opacity" values="0;0.5;0.3;0" keyTimes="0;0.1;0.8;1" dur="11s" repeatCount="indefinite" begin="5s"/>
  </circle>
  <circle cx="840" cy="220" r="2" fill="#00D9FF" opacity="0">
    <animate attributeName="cy" values="220;-10" dur="8.5s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0" keyTimes="0;0.1;0.8;1" dur="8.5s" repeatCount="indefinite" begin="6s"/>
  </circle>

  <!-- Side accent borders -->
  <rect x="0" y="0" width="3" height="220" fill="#00D9FF" opacity="0.8"/>
  <rect x="897" y="0" width="3" height="220" fill="#00D9FF" opacity="0.8"/>

  <!-- Side glow -->
  <rect x="3" y="0" width="60" height="220" fill="#00D9FF" opacity="0.04"/>
  <rect x="837" y="0" width="60" height="220" fill="#00D9FF" opacity="0.04"/>

  <!-- Corner brackets -->
  <path d="M8,8 L8,28 M8,8 L28,8" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.9"/>
  <path d="M892,8 L892,28 M892,8 L872,8" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.9"/>
  <path d="M8,212 L8,192 M8,212 L28,212" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.9"/>
  <path d="M892,212 L892,192 M892,212 L872,212" stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.9"/>

  <!-- NAME with pulsing glow -->
  <text x="450" y="102" font-family="Arial, sans-serif" font-size="58" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="5">VALENCIA S
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3s" repeatCount="indefinite"/>
  </text>
  <!-- Glow layer -->
  <text x="450" y="102" font-family="Arial, sans-serif" font-size="58" font-weight="bold"
        fill="#00D9FF" text-anchor="middle" letter-spacing="5" opacity="0.12">VALENCIA S
    <animate attributeName="opacity" values="0.06;0.18;0.06" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Animated divider line -->
  <rect x="150" y="118" width="600" height="1.5" fill="url(#divline)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle with fade pulse -->
  <text x="450" y="148" font-family="Arial, sans-serif" font-size="14" fill="#00D9FF"
        text-anchor="middle" letter-spacing="2.5">AI &amp; DS STUDENT  ·  FULLSTACK DEVELOPER  ·  COMPETITIVE PROGRAMMER
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom animated wave -->
  <path d="M0,200 C150,188 300,210 450,198 C600,186 750,208 900,196 L900,220 L0,220 Z"
        fill="#00D9FF" opacity="0.06">
    <animate attributeName="d"
      values="M0,200 C150,188 300,210 450,198 C600,186 750,208 900,196 L900,220 L0,220 Z;
              M0,205 C150,195 300,205 450,192 C600,179 750,202 900,190 L900,220 L0,220 Z;
              M0,200 C150,188 300,210 450,198 C600,186 750,208 900,196 L900,220 L0,220 Z"
      dur="5s" repeatCount="indefinite"/>
  </path>
  <path d="M0,210 C200,200 400,215 600,205 C750,196 850,210 900,204 L900,220 L0,220 Z"
        fill="#00D9FF" opacity="0.04">
    <animate attributeName="d"
      values="M0,210 C200,200 400,215 600,205 C750,196 850,210 900,204 L900,220 L0,220 Z;
              M0,214 C200,205 400,210 600,200 C750,192 850,206 900,200 L900,220 L0,220 Z;
              M0,210 C200,200 400,215 600,205 C750,196 850,210 900,204 L900,220 L0,220 Z"
      dur="7s" repeatCount="indefinite"/>
  </path>

</svg>